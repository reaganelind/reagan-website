<!DOCTYPE html>
<html>
<head>
  <title>Journal Entry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Reflection Journal</h2>

<div id="stepContainer">

  <h3 id="question"></h3>

  <textarea id="input" rows="6" cols="40"></textarea>
  <br><br>

  <button onclick="nextStep()">Next</button>

</div>

<br>
<a href="endnote.html">Return to Homepage</a>

<script>
let step = 0;
let answers = [];

const questions = [
  "What were you doing when your heart rate elevated?",
  "What was your environment when your heart rate elevated?",
  "What factors, if any, were contributing to your stress when your heartrate elevated?"
];

document.getElementById("question").textContent = questions[0];

function nextStep() {
  const input = document.getElementById("input").value;
  if (!input.trim()) return;

  answers.push(input.trim());
  document.getElementById("input").value = "";

  step++;

  if (step < questions.length) {
    document.getElementById("question").textContent = questions[step];
  } else {
    saveEntry();
  }
}

/* ---------- ENTER KEY SUPPORT ---------- */
document.getElementById("input").addEventListener("keydown", function (e) {
  if (e.key === "Enter") {
    e.preventDefault(); // prevents newline
    nextStep();
  }
});

function saveEntry() {
  const entry = {
    date: new Date().toLocaleString(),
    answers: answers
  };

  let entries = JSON.parse(localStorage.getItem("journalEntries")) || [];
  entries.push(entry);

  localStorage.setItem("journalEntries", JSON.stringify(entries));

  window.location.href = "endnote.html";
}
</script>

</body>
</html>
